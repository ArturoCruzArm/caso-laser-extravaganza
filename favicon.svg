<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- Haz rojo horizontal -->
  <line x1="0" y1="16" x2="32" y2="16" stroke="#cc2200" stroke-width="1.5" opacity="0.7"/>
  <!-- Haz azul horizontal -->
  <line x1="0" y1="19" x2="32" y2="19" stroke="#3366ff" stroke-width="1.2" opacity="0.7"/>
  <!-- Haz verde diagonal (galvanómetro) -->
  <line x1="4" y1="28" x2="28" y2="4" stroke="#00cc44" stroke-width="1" opacity="0.5"/>
  <!-- Punto central brillante (impacto) -->
  <circle cx="16" cy="16" r="5" fill="white" opacity="0.95"/>
  <circle cx="16" cy="16" r="3" fill="#ff4444"/>
  <circle cx="16" cy="16" r="1.5" fill="white"/>
</svg>
